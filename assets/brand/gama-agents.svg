<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none" width="220" height="52">
  <defs>
    <radialGradient id="ag-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="ag-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="44" height="44" rx="12" fill="#0B1321" x="0" y="4"/>
  <circle cx="22" cy="26" r="13" fill="url(#ag-glow)"/>
  <!-- Líneas violeta desde centro a 4 esquinas -->
  <line x1="22" y1="26" x2="8"  y2="12" stroke="#8B5CF6" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
  <line x1="22" y1="26" x2="36" y2="12" stroke="#8B5CF6" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
  <line x1="22" y1="26" x2="8"  y2="40" stroke="#8B5CF6" stroke-width="1.3" stroke-linecap="round" opacity="0.35"/>
  <line x1="22" y1="26" x2="36" y2="40" stroke="#8B5CF6" stroke-width="1.3" stroke-linecap="round" opacity="0.35"/>
  <!-- Nodos azules en esquinas -->
  <circle cx="8"  cy="12" r="3.2" fill="#3B82F6" opacity="0.75"/>
  <circle cx="36" cy="12" r="3.2" fill="#3B82F6" opacity="0.75"/>
  <circle cx="8"  cy="40" r="2.6" fill="#3B82F6" opacity="0.45"/>
  <circle cx="36" cy="40" r="2.6" fill="#3B82F6" opacity="0.45"/>
  <!-- Centro azul -->
  <circle cx="22" cy="26" r="5.5" fill="#3B82F6" filter="url(#ag-blur)"/>
  <circle cx="22" cy="26" r="3.5" fill="#60A5FA"/>
  <text x="54" y="24" font-family="Inter, sans-serif" font-weight="900" font-size="17" fill="#FFFFFF" letter-spacing="-0.6">Gama<tspan fill="#3B82F6">Agents</tspan></text>
  <text x="55" y="40" font-family="Inter, sans-serif" font-weight="500" font-size="9.5" fill="#475569" letter-spacing="2.2">AI PLATFORM</text>
</svg>
